<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumine Law</title>

    <style>
      body {
        margin: 0;
        opacity: 0;
        transition: opacity 0.1s;
        background: #000;
      }
      body.ready {
        opacity: 1;
      }
      @keyframes pulse {
        0% { opacity: 0.6; }
        50% { opacity: 0.8; }
        100% { opacity: 0.6; }
      }
    </style>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="src/assets/navbar/logo.webp"
    />

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.body.classList.add("ready");
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="src/app/main.jsx"></script>
  </body>
</html>
